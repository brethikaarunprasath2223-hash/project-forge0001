<button class="mobile-toggle" id="mobileToggle">☰</button>

    <div class="name">{{ user.full_name }}</div>
    <div class="sub">{{ user.department }}</div>
  </div>
</div>
  <nav>

    <a href="{{ url_for('project.my_projects') }}" data-tutorial="my-projects" class="nav-link {% if active=='my_projects' %}active{% endif %}">

    </a>
    <a href="#" class="nav-link" onclick="openAIAssistant(); return false;">
      <span class="icon">🤖</span> AI Assistant
     </a>
    
    <a href="{{ url_for('mentor.mentors') }}" data-tutorial="mentor" class="nav-link {% if active=='mentor' %}active{% endif %}">

    </a>
