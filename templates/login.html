{% extends "base.html" %}
{% block title %}Log In — Project Forge{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card glass">
    <h2>Welcome back</h2>
    <p class="subtitle">Log in to continue building your project.</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@college.edu" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>

    <div class="auth-footer">
      New to Project Forge? <a href="{{ url_for('auth.register') }}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
