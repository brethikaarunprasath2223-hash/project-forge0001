{% extends "base.html" %}
{% block title %}Error {{ code }} — Project Forge{% endblock %}
{% block content %}
<div class="hero">
  <div class="hero-content glass" style="padding:50px;">
    <h1 style="font-size:64px;">{{ code }}</h1>
    <p>{{ message }}</p>
    <div class="hero-actions" style="margin-top:24px;">
      <a href="{{ url_for('auth.welcome') }}" class="btn btn-primary">Go Home</a>
    </div>
  </div>
</div>
{% endblock %}
